name: Claude Code Review

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            이 PR의 변경 사항을 코드 리뷰해주세요. 다음 항목을 중점적으로 검토하고, 발견한 사항은 인라인 PR 코멘트로 남겨주세요:

            - **버그 및 로직 오류**: 런타임 에러, 엣지 케이스 누락, 잘못된 조건문
            - **TypeScript**: 타입 안전성, any 사용 여부, 불필요한 타입 단언
            - **React / Next.js 베스트 프랙티스**: hooks 규칙 준수, 불필요한 re-render, App Router 패턴
            - **보안**: SQL 인젝션, XSS, 민감 정보 노출, 입력값 검증
            - **성능**: 불필요한 연산, 메모이제이션 누락, 쿼리 최적화
            - **코드 품질**: 중복 코드, 명확하지 않은 네이밍, 불필요한 복잡성

            긍정적인 점도 간략히 언급해주세요. 전체 요약은 PR 코멘트로, 개별 이슈는 해당 코드 라인에 인라인 코멘트로 남겨주세요.
